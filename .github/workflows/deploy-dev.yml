name: Deploy Dev (Web)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "4.6-stable"
  GODOT_TEMPLATE_DIR: "4.6.stable"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64.zip
          sudo mv Godot_v${{ env.GODOT_RELEASE }}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_RELEASE }}_export_templates.tpz
          unzip -q Godot_v${{ env.GODOT_RELEASE }}_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_TEMPLATE_DIR }}/

      - name: Import assets
        run: timeout 300 godot --headless --import 2>&1 || true

      - name: Export (Web)
        run: |
          mkdir -p builds/web
          godot --headless --export-release "Web" builds/web/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: builds/web
          publish_branch: gh-pages
